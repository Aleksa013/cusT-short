<section class="testimonials container mx-auto flex flex-col px-14">
  <p class="font-bold text-orange-500 text-center text-5xl">{{title()}}</p>
<div class="content">
  <p class="font-medium text-orange-300 text-center text-3xl">{{text()}}</p>
<div class="carousel flex flex-wrap ">
  @for(card of testimonials(); track card.user_nickname) {
<mat-card class="w-1/6 mx-auto my-10 flex gap-5" appearance="outlined">
  <mat-card-header>
    <div mat-card-avatar class="bg-cover bg-65%-55%"  [style.background-image]="'url(' + card.user_avatar + ')'" ></div>
    <mat-card-title class="font-medium text-black text-center text-lg">{{card.user_nickname}}</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <p class="font-medium text-gray-600 text-center text-lg">{{card.content}}</p>
  </mat-card-content>
  <mat-card-actions>
    <button matButton>LIKE</button>
    <button matButton>SHARE</button>
  </mat-card-actions>
</mat-card>
  }
</div>

</div>
</section>
